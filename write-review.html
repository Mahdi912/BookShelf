<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Write a Review - BookShelf</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header>
        <nav>
            <a href="index.html" class="logo">BookShelf</a>
            <ul>
                <li><a href="index.html">Home Page</a></li>
                <li><a href="discover.html">Discover Books</a></li>
                <li><a href="recommendations.html">Recommendations</a></li>
                <li><a href="login.html">Login</a></li>
                <li><a href="register.html">Register</a></li>
                <li><a href="profile.html" class="active">My Profile</a></li>
            </ul>
        </nav>
    </header>

    <section class="review-section">
        <h2>Write a Review for the Book</h2>

        <form action="submit-review.html" method="POST" class="review-form">
            <!-- Rating Section -->
            <label for="rating">Rating:</label>
            <select id="rating" name="rating" required>
                <option value="1">1 Star</option>
                <option value="2">2 Stars</option>
                <option value="3">3 Stars</option>
                <option value="4">4 Stars</option>
                <option value="5">5 Stars</option>
            </select>

            <!-- Review Section -->
            <label for="review">Your Review:</label>
            <textarea id="review" name="review" rows="5" placeholder="Write your review here..." required></textarea>

            <button type="submit" class="btn">Submit Review</button>
        </form>
    </section>

    <footer>
        <p>&copy; 2025 BookShelf. All rights reserved.</p>
    </footer>
</body>
</html>
